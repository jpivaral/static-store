<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto — JocPi Store</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <nav class="nav">
    <div class="nav__inner">
      <a href="catalog.html" class="nav__logo"><span>◆</span> JocPi Store</a>
      <div class="nav__right">
        <a href="catalog.html" class="nav__back">← Catálogo</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- Breadcrumb -->
    <nav class="breadcrumb">
      <a href="catalog.html">Catálogo</a>
      <span class="breadcrumb__sep">›</span>
      <span id="bc-name">—</span>
    </nav>

    <!-- Detail -->
    <div id="detail-wrap">
      <div style="text-align:center;padding:5rem 0;color:var(--muted);">Cargando…</div>
    </div>

    <!-- Related -->
    <div id="related-wrap"></div>

  </div>

  <div id="toasts"></div>
  <script src="assets/js/store.js"></script>
  <script>
    (async () => {
      Store.fromData(await Store.fetchJSON());

      const id = new URLSearchParams(location.search).get('id');
      const p  = id ? Store.getById(id) : null;
      const wrap = document.getElementById('detail-wrap');

      if (!p) {
        wrap.innerHTML = `
          <div style="text-align:center;padding:5rem 0;">
            <div style="font-size:2.5rem;color:var(--muted);margin-bottom:1rem;">○</div>
            <h2>Producto no encontrado</h2>
            <a href="catalog.html" class="btn btn--outline" style="margin-top:1.5rem;display:inline-flex;">← Volver al catálogo</a>
          </div>`;
        return;
      }

      document.title = `${p.name} — JocPi Store`;
      document.getElementById('bc-name').textContent = p.name;

      const imgs = p.images?.length ? p.images : [''];
      const ss   = Store.stockStatus(p.stock ?? 0);

      const hasMany = imgs.length > 1;

      wrap.innerHTML = `
        <div class="detail">
          <!-- Carousel -->
          <div class="detail__gallery">
            <div class="carousel">
              <div class="carousel__main">
                <img id="main-img" src="${imgs[0]}" alt="${p.name}" loading="eager"
                  onerror="this.style.opacity='.2'">
              </div>
              ${hasMany ? `
              <button class="carousel__btn carousel__btn--prev" id="c-prev">&#8249;</button>
              <button class="carousel__btn carousel__btn--next" id="c-next">&#8250;</button>
              <div class="carousel__dots">
                ${imgs.map((_, i) => `<button class="carousel__dot${i === 0 ? ' is-active' : ''}"></button>`).join('')}
              </div>
              <div class="carousel__thumbs">
                ${imgs.map((url, i) => `
                  <div class="carousel__thumb${i === 0 ? ' is-active' : ''}">
                    <img src="${url}" alt="${p.name} ${i+1}" loading="lazy">
                  </div>`).join('')}
              </div>` : ''}
            </div>
          </div>

          <!-- Info -->
          <div class="detail__info">
            <div class="detail__cat">
              <span>${p.category || ''}</span>
              ${p.featured ? `<span class="badge badge--feat">Destacado</span>` : ''}
            </div>
            <h1 class="detail__name">${p.name}</h1>
            <div class="detail__price">${Store.formatPrice(p.price)}</div>

            <p class="detail__desc">${p.description || 'Sin descripción.'}</p>

            <div class="detail__meta">
              <div class="detail__meta-item">
                <div class="detail__meta-label">Categoría</div>
                <div class="detail__meta-val">${p.category || '—'}</div>
              </div>
              <div class="detail__meta-item">
                <div class="detail__meta-label">Disponibilidad</div>
                <div class="detail__meta-val" style="display:flex;align-items:center;gap:.45rem;">
                  <span class="stock-dot ${ss.cls}"></span> ${ss.label}
                </div>
              </div>
            </div>

            <div class="detail__actions">
              <button
                class="btn btn--dark btn--full"
                id="btn-contact"
                ${p.stock === 0 ? 'disabled style="opacity:.4;cursor:not-allowed;"' : ''}>
                ${p.stock === 0 ? 'Sin stock disponible' : 'Contactar por WhatsApp'}
              </button>
              <a href="catalog.html" class="btn btn--outline btn--full">
                ← Seguir explorando
              </a>
            </div>
          </div>
        </div>`;

      // Carousel logic
      if (hasMany) {
        let current = 0;
        const mainImg   = document.getElementById('main-img');
        const dots      = [...document.querySelectorAll('.carousel__dot')];
        const thumbs    = [...document.querySelectorAll('.carousel__thumb')];

        function goTo(i) {
          current = (i + imgs.length) % imgs.length;
          mainImg.src = imgs[current];
          dots.forEach((d, j)  => d.classList.toggle('is-active', j === current));
          thumbs.forEach((t, j) => t.classList.toggle('is-active', j === current));
          thumbs[current]?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        document.getElementById('c-prev').addEventListener('click', () => goTo(current - 1));
        document.getElementById('c-next').addEventListener('click', () => goTo(current + 1));
        dots.forEach((d, i)   => d.addEventListener('click', () => goTo(i)));
        thumbs.forEach((t, i) => t.addEventListener('click', () => goTo(i)));

        // Swipe support
        let startX = 0;
        const track = document.querySelector('.carousel__main');
        track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
        track.addEventListener('touchend',   e => {
          const dx = e.changedTouches[0].clientX - startX;
          if (Math.abs(dx) > 40) goTo(current + (dx < 0 ? 1 : -1));
        });
      }

      // WhatsApp button — edit phone number below
      const PHONE = '50230994309';
      document.getElementById('btn-contact')?.addEventListener('click', () => {
        const msg = `Hola, me interesa el producto *${p.name}* (${Store.formatPrice(p.price)}). ¿Está disponible?`;
        window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
      });

      // Related products
      const related = Store.getByCategory(p.category)
        .filter(x => x.id !== p.id)
        .slice(0, 3);

      if (related.length) {
        const relatedWrap = document.getElementById('related-wrap');
        relatedWrap.innerHTML = `
          <div class="related">
            <div class="related__title">También te puede gustar</div>
            <div class="products-grid">
              ${related.map(r => {
                const img = r.images?.[0] || '';
                return `
                  <a href="product.html?id=${r.id}" class="pcard">
                    <div class="pcard__img">
                      ${img ? `<img src="${img}" alt="${r.name}" loading="lazy">` : ''}
                      ${r.featured ? `<div class="pcard__badge">Destacado</div>` : ''}
                    </div>
                    <div class="pcard__body">
                      <div class="pcard__cat">${r.category || ''}</div>
                      <div class="pcard__name">${r.name}</div>
                      <div class="pcard__footer">
                        <div class="pcard__price">${Store.formatPrice(r.price)}</div>
                        <div class="pcard__btn">→</div>
                      </div>
                    </div>
                  </a>`;
              }).join('')}
            </div>
          </div>`;
      }
    })();
  </script>
</body>
</html>
